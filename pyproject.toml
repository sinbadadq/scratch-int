[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = ["E501"]  # don't enforce line length in lint (formatter handles it)

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"